name: BloodSells
version: ${project.version}
main: dev.bloodworth.bloodsells.BloodSellsPlugin
api-version: '1.21'
author: BloodWorth
description: Simple Vault item worth and selling system.
softdepend:
  - Vault
commands:
  bloodsells:
    description: BloodSells main command.
    usage: /bloodsells reload
    aliases: [bsells]
  sellhand:
    description: Sell the stack in your main hand.
    usage: /sellhand
  sellgui:
    description: Open the BloodSells sell GUI.
    usage: /sellgui
  sellall:
    description: Sell every matching material in your inventory.
    usage: /sellall <item>
  sellhandall:
    description: Sell every inventory item matching your hand.
    usage: /sellhandall
  worth:
    description: Check or set item worth.
    usage: /worth <set|info>
  worthdisplay:
    description: Toggle your item worth lore display.
    usage: /worthdisplay [on|off|toggle]
    aliases: [worthlore]
permissions:
  bloodsells.use:
    default: true
  bloodsells.sellhand:
    default: true
  bloodsells.sellgui:
    default: true
  bloodsells.sellall:
    default: true
  bloodsells.sellhandall:
    default: true
  bloodsells.admin:
    default: op
  bloodsells.reload:
    default: op
  bloodsells.worth.set:
    default: op
  bloodsells.worth.info:
    default: op
  bloodsells.worthdisplay:
    default: true

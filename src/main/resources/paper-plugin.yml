name: BloodSells
version: ${project.version}
main: dev.bloodworth.bloodsells.BloodSellsPlugin
api-version: '1.21'
author: BloodWorth
description: Modern multi-economy worth and selling system.
softdepend:
  - Vault
  - CoinsEngine
  - PlayerPoints
  - ExcellentEconomy
  - PlaceholderAPI
  - ItemsAdder
  - Oraxen
  - MMOItems
permissions:
  bloodsells.use:
    default: true
  bloodsells.sellhand:
    default: true
  bloodsells.sellgui:
    default: true
  bloodsells.sellall:
    default: true
  bloodsells.sellhandall:
    default: true
  bloodsells.admin:
    default: op
  bloodsells.worth.set:
    default: op
  bloodsells.worth.economy:
    default: op
  bloodsells.worth.reload:
    default: op
  bloodsells.worth.info:
    default: op
